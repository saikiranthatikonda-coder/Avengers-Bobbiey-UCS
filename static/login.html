<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BOBBIEY UCS · COMMAND ACCESS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root { --accent:#00d9ff; --bg:#040b14; --edge:#0d3a5a; --dim:#7e96b3; --err:#ff3c3c; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(0,217,255,0.09), transparent 55%),
      radial-gradient(ellipse at 50% 115%, rgba(0,217,255,0.06), transparent 55%),
      var(--bg);
    font-family:'Share Tech Mono', monospace; color:#cfe3f5; overflow:hidden;
  }
  .grid { position:fixed; inset:0; pointer-events:none; opacity:0.35;
    background-image:linear-gradient(rgba(13,58,90,0.35) 1px, transparent 1px),
                     linear-gradient(90deg, rgba(13,58,90,0.35) 1px, transparent 1px);
    background-size:44px 44px; }
  .card {
    position:relative; width:min(380px, 92vw); padding:2.2rem 2rem 1.8rem;
    border:1px solid var(--edge); border-radius:10px;
    background:linear-gradient(180deg, rgba(13,58,90,0.22), rgba(4,11,20,0.85));
    box-shadow:0 0 0 1px rgba(0,217,255,0.06) inset, 0 20px 60px rgba(0,0,0,0.6);
  }
  .card::before { content:''; position:absolute; top:-1px; left:1.4rem; right:1.4rem; height:1px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent); }
  .brand { font-family:'Orbitron'; font-weight:900; font-size:1.05rem; letter-spacing:0.3em;
    color:var(--accent); text-shadow:0 0 14px rgba(0,217,255,0.6); text-align:center; }
  .sub { font-family:'Orbitron'; font-size:0.5rem; letter-spacing:0.32em; color:var(--dim);
    text-align:center; margin:0.5rem 0 1.8rem; }
  .ring { width:64px; height:64px; margin:0 auto 1.4rem; border-radius:50%;
    border:1px dashed rgba(0,217,255,0.5); display:flex; align-items:center; justify-content:center;
    animation:spin 14s linear infinite; }
  .ring i { width:34px; height:34px; border-radius:50%; border:1px solid var(--accent);
    box-shadow:0 0 18px rgba(0,217,255,0.5), 0 0 6px rgba(0,217,255,0.8) inset; animation:spin 6s linear infinite reverse; }
  @keyframes spin { to { transform:rotate(360deg); } }
  label { display:block; font-family:'Orbitron'; font-size:0.5rem; letter-spacing:0.24em;
    color:var(--dim); margin-bottom:0.45rem; }
  input {
    width:100%; background:rgba(2,8,16,0.8); border:1px solid var(--edge); border-radius:5px;
    color:#e8f4ff; font-family:'Share Tech Mono'; font-size:0.95rem; letter-spacing:0.14em;
    padding:0.65rem 0.8rem; outline:none; transition:border-color .25s, box-shadow .25s;
  }
  input:focus { border-color:var(--accent); box-shadow:0 0 12px rgba(0,217,255,0.25); }
  button {
    width:100%; margin-top:1rem; padding:0.7rem; cursor:pointer;
    background:rgba(0,217,255,0.08); border:1px solid var(--accent); border-radius:5px;
    color:var(--accent); font-family:'Orbitron'; font-weight:700; font-size:0.6rem; letter-spacing:0.3em;
    transition:background .25s, box-shadow .25s;
  }
  button:hover { background:rgba(0,217,255,0.16); box-shadow:0 0 16px rgba(0,217,255,0.3); }
  button:disabled { opacity:0.5; cursor:default; }
  .msg { min-height:1.2rem; margin-top:0.9rem; font-size:0.72rem; letter-spacing:0.06em;
    text-align:center; color:var(--dim); }
  .msg.err { color:var(--err); }
  .foot { margin-top:1.4rem; text-align:center; font-family:'Orbitron'; font-size:0.42rem;
    letter-spacing:0.26em; color:var(--dim); }
</style>
</head>
<body>
<div class="grid"></div>
<form class="card" id="f">
  <div class="ring"><i></i></div>
  <div class="brand">BOBBIEY UCS</div>
  <div class="sub">REMOTE COMMAND ACCESS · AUTHORIZATION REQUIRED</div>
  <label for="pw">ACCESS PASSWORD</label>
  <input id="pw" type="password" autocomplete="current-password" autofocus/>
  <button id="go" type="submit">AUTHENTICATE</button>
  <div class="msg" id="msg"></div>
  <div class="foot">LOOPBACK CONSOLE NEVER REQUIRES LOGIN · SESSIONS AUDIT-LOGGED</div>
</form>
<script>
  const msg = document.getElementById('msg');
  fetch('/api/auth/status').then(r=>r.json()).then(s=>{
    if (s.authenticated) { location.href = '/'; return; }
    if (!s.password_set) {
      msg.textContent = 'remote access is disabled — set a password on the host machine first';
      document.getElementById('go').disabled = true;
      document.getElementById('pw').disabled = true;
    }
  }).catch(()=>{});
  document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();
    const go = document.getElementById('go');
    go.disabled = true; msg.className = 'msg'; msg.textContent = 'verifying…';
    try {
      const r = await fetch('/api/auth/login', { method:'POST',
        headers:{'content-type':'application/json'},
        body: JSON.stringify({ password: document.getElementById('pw').value }) });
      const d = await r.json();
      if (d.ok) { msg.textContent = 'access granted — opening command center…'; location.href = '/'; return; }
      msg.className = 'msg err'; msg.textContent = d.error || 'authentication failed';
    } catch (err) { msg.className = 'msg err'; msg.textContent = 'server unreachable'; }
    go.disabled = false;
  });
</script>
</body>
</html>
